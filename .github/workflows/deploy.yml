name: Deploy to Render

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    
    - name: Check code formatting
      run: |
        pip install black
        black --check backend/ || echo "Warning: Code formatting issues found"
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Warning: Linting issues found"
    
    - name: Verify project structure
      run: |
        test -f backend/main.py || exit 1
        test -f backend/auth.py || exit 1
        test -f backend/supabase_client.py || exit 1
        test -f backend/requirements.txt || exit 1
        test -f database/schema.sql || exit 1
        echo "✓ All required files present"

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Build success
      run: |
        echo "✅ Build and tests passed successfully!"
        echo "🚀 Render will deploy automatically if webhook is configured"
