{% extends "base.html" %}
{% block title %}Join the Movement{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card shield-card wide">
    <div class="auth-header">
      <div class="shield-badge">✟</div>
      <h1>Join Christ Revolution</h1>
      <p>Create your account. Receive your Unique ID.</p>
    </div>
    <form id="registerForm" class="auth-form">
      <div class="form-row">
        <div class="form-group full">
          <label>Full Name</label>
          <input type="text" name="full_name" required />
        </div>
      </div>
      <div class="form-row three">
        <div class="form-group">
          <label>Continent</label>
          <select name="continent" required>
            <option value="">Select</option>
            <option>Africa</option><option>Americas</option><option>Europe</option>
            <option>Asia</option><option>Australia</option>
          </select>
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" name="country" required />
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" required />
        </div>
      </div>
      <div class="form-group">
        <label>Village / Area (optional)</label>
        <input type="text" name="village" />
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required />
        </div>
        <div class="form-group">
          <label>Phone (with country code)</label>
          <input type="tel" name="phone" required placeholder="+254..." />
        </div>
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required minlength="8" />
        </div>
      </div>
      <label class="checkbox">
        <input type="checkbox" required />
        I agree to the data privacy policy and consent to follow-up communication.
      </label>
      <div class="form-error" id="regError"></div>
      <button type="submit" class="btn btn-primary btn-block">Create My Account</button>
      <p class="auth-switch">Already a member? <a href="/login">Sign In</a></p>
    </form>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form));
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (!res.ok) {
      const err = await res.json();
      document.getElementById('regError').textContent = err.detail || 'Registration failed';
      return;
    }
    const result = await res.json();
    document.cookie = `crm_session=${result.token}; path=/; max-age=${60*60*24*30}`;
    window.location.href = '/portal';
  } catch (err) {
    document.getElementById('regError').textContent = 'Network error';
  }
});
</script>
{% endblock %}
