{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card shield-card">
    <div class="auth-header">
      <div class="shield-badge">✟</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your CRM portal</p>
    </div>
    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" />
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      <div class="auth-divider"><span>or continue with</span></div>
      <div class="social-login">
        <button type="button" class="btn btn-outline">Google</button>
        <button type="button" class="btn btn-outline">Apple</button>
      </div>
      <p class="auth-switch">Don't have an account? <a href="/register">Join the Movement</a></p>
    </form>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = {
    username: form.username.value,
    password: form.password.value
  };
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (!res.ok) {
      const err = await res.json();
      document.getElementById('loginError').textContent = err.detail || 'Login failed';
      return;
    }
    const result = await res.json();
    document.cookie = `crm_session=${result.token}; path=/; max-age=${60*60*24*30}`;
    window.location.href = '/portal';
  } catch (err) {
    document.getElementById('loginError').textContent = 'Network error';
  }
});
</script>
{% endblock %}
